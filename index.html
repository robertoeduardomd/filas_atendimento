<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Filas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
      <div class="centorg">
<h1 >Service desk N1</h1>
        <div id="btnLoginHeader" style="background:rgb(114, 106, 2);cursor:pointer; border-radius: 30px; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; padding: 10px;">
    Entrar / Login
</div>
      </div>
        
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
     

    </div>
        <h2 id="tituloFila">Fila de atendimento</h1>
        
      
       
        <section id="adminPanel" class="card" style="display:none; margin-bottom: 20px;">
            <h2>Cadastro de Colaborador</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-direction: column;">
                <input type="text" id="nomeColaborador" placeholder="Nome do colaborador" style="padding: 10px; border-radius: 6px; border: none;">
                <input type="color" id="corColaborador" value="#3498db" style="width: 100%; height: 40px; border: none;">
            </div>
            <button onclick="salvarColaborador()" style="background: #00C853; width: 100%;">Salvar Colaborador</button>
        </section>

        <div class="painel-superior">
             
            <section class="card">
                <h2>Na fila</h2>
                <div id="fila"></div>
                   <div class="acoes">
            <button id="btnFila" onclick="toggleMinhaPosicao()">Entrar na fila</button>
           
        </div>
            </section>

        <section class="card3">
                <h2>Últimas Atualizações</h2>
                <div id="listaHistorico"></div>
                <button id="btnHistorico">Ver histórico completo</button>
            </section>    
        </div>
         <section class="card2">
            <h2>Fora da Fila</h2>
            <div id="foraFila"></div>
        </section>
       
          <nav class="tabs">
            
             <button id="btnAdmin" onclick="toggleAdmin()">Administrador</button>
        </nav>


      

      
    </div>

    <!-- Modais -->
  <div id="modalLogin" class="modal-overlay" style="display:none;"> 
    <div class="card ">
        <h2>Identifique-se</h2>
        <select id="selectUsuario" style="width: 100%; padding: 10px; margin: 10px 0; color: black;"></select>
        <input type="password" id="inputSenha" placeholder="Senha" style="width: 100%; padding: 10px; margin-bottom: 10px; color: black;">
        <button id="btnEntrarSistema" onclick="validarLogin()" style="margin-bottom: 10px;">Entrar</button>
        <button onclick="fecharModal('modalLogin')" style="background: #ccc; color: #333;">Cancelar</button>
    </div>
</div>
<div id="modalAlterarSenha" class="modal-overlay" style="display:none;">
    <div class="card login-card">
        <h2>Alterar Senha</h2>
        <input type="password" id="novaSenha" placeholder="Nova senha" style="width: 100%; padding: 10px; margin: 10px 0; color: black;">
        <button onclick="salvarNovaSenha()">Salvar e Entrar</button>
    </div>
</div>
<!-- MODAL MENU ADMIN -->

<div id="modalMenuAdmin" class="modal-overlay" style="display:none;">

    <div class="login-card">

        <h2>Administrador</h2>

        <button onclick="abrirNovoColaborador()">
            ➕ Novo colaborador
        </button>

        <button onclick="abrirEditarColaborador()">
            ✏ Editar colaborador
        </button>

        <button onclick="abrirRemoverColaborador()">
            🗑 Remover colaborador
        </button>

        <button onclick="fecharModalAdmin()">
            Fechar
        </button>

    </div>

</div>


<!-- MODAL NOVO COLABORADOR -->

<div id="modalNovoColaborador" class="modal-overlay" style="display:none;">
    <div class="card ">
        <h2>Novo colaborador</h2>
        <input id="nomeColaborador" type="text" placeholder="Nome">
        <br><br>
        <input id="corColaborador" type="color" value="#3498db">
        <br><br>
        
    <div class="ldld">
        <button onclick="fecharModal('modalNovoColaborador')" style="background: #ccc; color: #333;">Cancelar</button>
        <button onclick="salvarColaborador()" style="margin-bottom: 10px;">Salvar</button>
    </div>
    </div>

</div>

<div id="modalEditarColaborador" class="modal-overlay" style="display:none;">
    <div class="card ">
        <h2>Editar Colaborador</h2>

        <!-- O onchange avisa o JS para preencher os dados assim que você escolhe um nome -->
        <select id="selectEditarColaborador" onchange="preencherDadosEdicao()" style="width: 100%; padding: 10px; margin-bottom: 15px; color: black; border-radius: 6px;">
            <option value="">Selecione um colaborador...</option>
        </select>

        <input id="nomeEditarColaborador" type="text" placeholder="Nome do colaborador" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: none;">
        
        <input id="corEditarColaborador" type="color" value="#3498db" style="width: 100%; height: 40px; border: none; margin-bottom: 15px; border-radius: 6px;">
 <div class="ldld">
     <button onclick="fecharModal('modalEditarColaborador')" style="background: #ccc; color: #333;">Cancelar / Voltar</button>
     <button onclick="salvarEdicaoColaborador()" style="margin-bottom: 10px; background: #FF9800;">Salvar Alterações</button>
    </div>

    </div>
</div>
<!-- MODAL REMOVER COLABORADOR -->
<div id="modalRemoverColaborador" class="modal-overlay" style="display:none;">
    <div class="card ">
        <h2>Remover Colaborador</h2>

        <select id="selectRemoverColaborador" style="width: 100%; padding: 10px; margin-bottom: 15px; color: black; border-radius: 6px;">
            <option value="">Selecione um colaborador...</option>
        </select>
 <div class="ldld">
     <button onclick="fecharModal('modalRemoverColaborador')" style="background: #ccc; color: #333;">Cancelar / Voltar</button>
     <button onclick="abrirConfirmacaoRemocao()" style="margin-bottom: 10px; background: #F44336;">Remover Colaborador</button>
    </div>

        <!-- Este botão não deleta direto, ele chama a confirmação -->
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO (TEM CERTEZA?) -->
<div id="modalConfirmarRemocao" class="modal-overlay" style="display:none; z-index: 9999;">
    <div class="card" style="border: 2px solid #F44336;">
        <h2 style="color: #F44336;">Tem certeza?</h2>
        
        <p id="textoConfirmacaoRemocao" style="margin-bottom: 20px; text-align: center;">
            Você deseja realmente excluir este colaborador?
        </p>
 <div class="ldld">
     <button onclick="cancelarConfirmacaoRemocao()" style="background: #ccc; color: #333;">Cancelar / Voltar</button>
     <button onclick="executarRemocao()" style="margin-bottom: 10px; background: #F44336;">Sim, Remover Definitivamente</button>
    </div>

    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
